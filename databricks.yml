
bundle:
  name: fingrid-data-pipeline

# 1. Declare all custom variables at the top level with default values from your dev environment.
variables:
  cluster_id:
    description: "The ID of the cluster to use for job tasks."
    default: "0923-182558-foyt4nl4"
  catalog:
    description: "The Unity Catalog to use."
    default: "w_dev"
  landing_root:
    description: "The root S3 path for the landing zone."
    default: "s3a://wartsila-datalake-dev-landing/"
  managed_uc_root:
    description: "The root S3 path for the managed Unity Catalog."
    default: "s3a://wartsila-datalake-dev-managed-uc/"
  bronze_root:
    description: "The root S3 path for the bronze layer."
    default: "s3a://wartsila-datalake-dev-bronze/"
  silver_root:
    description: "The root S3 path for the silver layer."
    default: "s3a://wartsila-datalake-dev-silver/"
  gold_root:
    description: "The root S3 path for the gold layer."
    default: "s3a://wartsila-datalake-dev-gold/"

# Defines the reusable resources like jobs and pipelines.
resources:
  # 2. Define the Delta Live Tables (DLT) pipeline.
  pipelines:
    fingrid_dlt_pipeline:
      name: "Fingrid DLT Pipeline"
      clusters:
        - label: "default"
          num_workers: 1
      libraries:
        - notebook:
            path: ./DLT_Pipeline/transformations/my_transformation.ipynb
      # Pass variables into the DLT pipeline's Spark configuration.
      configuration:
        fingrid.catalog: ${var.catalog}
        fingrid.landing_root: ${var.landing_root}

  # 3. Define a multi-task job that orchestrates all notebooks and the DLT pipeline.
  jobs:
    multi_task_job:
      name: "Fingrid Data Engineering Job"
      tasks:
        # Task 1: Run the configuration notebook.
        - task_key: "Run_Configuration"
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./1_Configuration.ipynb
            base_parameters:
              catalog: ${var.catalog}
              landing_root: ${var.landing_root}
              managed_uc_root: ${var.managed_uc_root}
              bronze_root: ${var.bronze_root}
              silver_root: ${var.silver_root}
              gold_root: ${var.gold_root}
        # Task 2: Run the source-to-landing notebook.
        - task_key: "Process_Source_to_Landing"
          depends_on:
            - task_key: "Run_Configuration"
          existing_cluster_id: ${var.cluster_id}
          notebook_task:
            notebook_path: ./2_source_to_landing.ipynb
            base_parameters:
              catalog: ${var.catalog}
              landing_root: ${var.landing_root}
        # Task 3: Run the DLT pipeline.
        - task_key: "Run_DLT_Pipeline"
          depends_on:
            - task_key: "Process_Source_to_Landing"
          pipeline_task:
            pipeline_id: ${resources.pipelines.fingrid_dlt_pipeline.id}

# 4. Define the deployment targets and override the default variables for each environment.
targets:
  # ===== DEVELOPMENT TARGET =====
  dev:
    default: true
    workspace:
      host: https://dbc-155af052-4ab1.cloud.databricks.com/
    # No variables needed here, as it uses the default values defined at the top.

  # ===== TESTING TARGET =====
  test:
    workspace:
      host: https://dbc-c93e1e6f-75f2.cloud.databricks.com/
    variables:
      cluster_id: "0924-141340-473elqxr"
      catalog: "w_test"
      landing_root: "s3a://wartsila-datalake-test-landing/"
      managed_uc_root: "s3a://wartsila-datalake-test-managed-uc/"
      bronze_root: "s3a://wartsila-datalake-test-bronze/"
      silver_root: "s3a://wartsila-datalake-test-silver/"
      gold_root: "s3a://wartsila-datalake-test-gold/"

  # ===== PRODUCTION TARGET =====
  prod:
    workspace:
      host: https://your-prod-workspace.databricks.com
    variables:
      cluster_id: "YOUR_PROD_CLUSTER_ID"
      catalog: "w_prod"
      landing_root: "s3a://wartsila-datalake-prod-landing/"
      managed_uc_root: "s3a://wartsila-datalake-prod-managed-uc/"
      bronze_root: "s3a://wartsila-datalake-prod-bronze/"
      silver_root: "s3a://wartsila-datalake-prod-silver/"
      gold_root: "s3a://wartsila-datalake-prod-gold/"

