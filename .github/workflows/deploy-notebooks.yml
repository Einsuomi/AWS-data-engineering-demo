name: Deploy Databricks Notebooks

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'The target environment (dev, test, or prod)'
        required: true
        default: 'dev'

jobs:
  deploy-to-databricks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy and Run Databricks Asset Bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Deploy the job definition to Databricks
          databricks bundle deploy -t ${{ github.event.inputs.environment }}
          # FINAL UPDATE: Run the job named 'multi_task_job'
          databricks bundle run multi_task_job -t ${{ github.event.inputs.environment }}
